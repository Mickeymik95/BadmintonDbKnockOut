<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Double Knockout Badminton</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333;}
h2,h3{text-align:center}
.container{display:flex;flex-direction:column;align-items:center}
.bracket{display:grid;grid-template-columns:1fr 1fr;gap:15px;width:95%;max-width:1200px}
.bracketColumn{background:#fff;padding:10px;border-radius:10px}
.match{display:flex;align-items:center;gap:5px;margin:6px 0;padding:6px;border:1px solid #ccc;border-radius:6px}
.match span{flex:1;text-align:center;font-weight:600}
input{width:40px;text-align:center;font-weight:700}
@media(max-width:768px){.bracket{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="container">
<h2>🏸 Double Knockout Badminton</h2>

<input id="teamCount" type="number" min="3" max="16" value="8">
<button onclick="startTournament()">Jana Bracket</button>

<div class="bracket" id="bracket"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyD_TFKKA1QPtNtp_U2BRyVEQodBVWjMLqs",
  databaseURL:"https://badmintondbknout-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

let matches=[];

// ========= START =========
function startTournament(){
  const n=+teamCount.value;
  if(n<3) return alert("Min 3 team");

  db.ref("matches").remove();

  let teams=[];
  for(let i=1;i<=n;i++) teams.push("Team "+i);
  if(teams.length%2) teams.push("BYE");

  for(let i=0;i<teams.length;i+=2){
    db.ref("matches").push({
      bracket:"WB",
      a:teams[i],
      b:teams[i+1],
      sa:"",
      sb:"",
      winner:"",
      loser:""
    });
  }
}

// ========= RENDER =========
function render(){
  bracket.innerHTML="";
  const wb=document.createElement("div");
  const lb=document.createElement("div");
  wb.className=lb.className="bracketColumn";
  wb.innerHTML="<h3>Winner Bracket</h3>";
  lb.innerHTML="<h3>Loser Bracket</h3>";

  matches.forEach(m=>{
    const el=document.createElement("div");
    el.className="match";
    el.innerHTML=`
      <span>${m.a}</span>
      <input value="${m.sa}" onchange="score('${m.id}','sa',this.value)">
      <span>🆚</span>
      <input value="${m.sb}" onchange="score('${m.id}','sb',this.value)">
      <span>${m.b}</span>
    `;
    (m.bracket==="WB"?wb:lb).appendChild(el);
  });

  bracket.append(wb,lb);
}

// ========= SCORE =========
function score(id,field,val){
  const m=matches.find(x=>x.id===id);
  if(!m) return;

  const sa=field==="sa"?val:m.sa;
  const sb=field==="sb"?val:m.sb;

  let winner="", loser="";
  if(sa!=="" && sb!=="" && !m.winner){
    if(+sa>+sb){winner=m.a; loser=m.b}
    if(+sb>+sa){winner=m.b; loser=m.a}
  }

  db.ref("matches/"+id).update({
    [field]:val,
    winner,
    loser
  });

  if(winner && m.bracket==="WB" && loser!=="BYE"){
    db.ref("matches").push({
      bracket:"LB",
      a:loser,
      b:"",
      sa:"",
      sb:"",
      winner:"",
      loser:""
    });
  }
}

// ========= FIREBASE LISTENER (SAFE) =========
db.ref("matches").on("value",snap=>{
  if(!snap.exists()) return;
  matches=Object.entries(snap.val()).map(([id,v])=>({...v,id}));
  render();
});
</script>
</body>
</html>
