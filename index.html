<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Badminton Double Elimination LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
}
header{
  margin:20px;
  padding:20px;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(12px);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  text-align:center;
}
input,button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-size:15px;
}
button{
  background:linear-gradient(135deg,#43cea2,#185a9d);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.bracket{
  display:flex;
  gap:25px;
  padding:20px;
  overflow-x:auto;
}
.match{
  background:#fff;
  padding:14px;
  border-radius:16px;
  min-width:260px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.3s;
}
.match:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.team{
  background:#f1f1f1;
  padding:8px;
  border-radius:10px;
  margin:6px 0;
}
.win{background:#2ecc71;color:#fff;font-weight:bold}
.lose{background:#e74c3c;color:#fff}
.score{
  display:flex;
  gap:6px;
  margin:8px 0;
}
.score input{
  width:70px;
  text-align:center;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>

<body>

<header>
  <h2>🏸 Badminton LIVE Bracket</h2>
  <input id="teamCount" type="number" min="2" placeholder="Jumlah Pasukan">
  <button onclick="generate()">Jana Bracket</button>
</header>

<div class="bracket" id="bracket"></div>

<script>
// 🔥 FIREBASE CONFIG AWAK (SIAP)
const firebaseConfig = {
  apiKey: "AIzaSyD_TFKKA1QPtNtp_U2BRyVEQodBVWjMLqs",
  authDomain: "badmintondbknout.firebaseapp.com",
  databaseURL: "https://badmintondbknout-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "badmintondbknout",
  storageBucket: "badmintondbknout.firebasestorage.app",
  messagingSenderId: "810227668279",
  appId: "1:810227668279:web:ea68f760342f893a3776b2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Jana bracket
function generate(){
  const n=parseInt(teamCount.value);
  if(!n||n<2) return alert("Minimum 2 pasukan");

  let size=1; while(size<n) size*=2;
  let teams=[];
  for(let i=1;i<=n;i++) teams.push("Pasukan "+i);
  while(teams.length<size) teams.push("BYE");

  db.ref("live").set({teams,results:{}});
}

// Render LIVE
db.ref("live").on("value",snap=>{
  if(!snap.exists()) return;
  const data=snap.val();
  render(data.teams,data.results||{});
});

function render(teams,results){
  bracket.innerHTML="";
  for(let i=0;i<teams.length;i+=2){
    const r=results[i]||{};
    const m=document.createElement("div");
    m.className="match";
    m.innerHTML=`
      <div class="team ${r.win===i?'win':r.lose===i?'lose':''}" id="t${i}">${teams[i]}</div>
      <div class="team ${r.win===i+1?'win':r.lose===i+1?'lose':''}" id="t${i+1}">${teams[i+1]}</div>
      <div class="score">
        <input id="s${i}" placeholder="21" value="${r.s1||''}">
        <input id="s${i+1}" placeholder="13" value="${r.s2||''}">
      </div>
      <button onclick="save(${i})">✔ Sahkan</button>
    `;
    bracket.appendChild(m);
  }
}

function save(i){
  const s1=parseInt(document.getElementById("s"+i).value);
  const s2=parseInt(document.getElementById("s"+(i+1)).value);
  if(isNaN(s1)||isNaN(s2)) return alert("Score tak sah");

  const win=s1>s2?i:i+1;
  const lose=s1>s2?i+1:i;

  db.ref("live/results/"+i).set({
    s1,s2,win,lose
  });
}
</script>

</body>
</html>
